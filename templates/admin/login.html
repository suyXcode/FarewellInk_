<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — FarewellInk 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--grad-hero);padding:1rem">

<div class="glass-card p-4 p-lg-5 w-100" style="max-width:420px">
  <div class="text-center mb-4">
    <div style="font-size:3rem">🎓</div>
    <div class="fi-brand d-block mt-2" style="font-family:var(--font-display);font-size:1.6rem;color:var(--gold)">
      FarewellInk
    </div>
    <p class="text-muted small mt-1">Admin Portal · Class of 2026</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat,msg in messages %}
      <div class="alert alert-{{cat}} alert-dismissible fade show mb-3 fi-alert">
        {{msg}}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}{% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('admin_login') }}">
    <div class="mb-3">
      <label class="fi-label">Username</label>
      <div class="input-group">
        <span class="input-group-text admin-ig"><i class="fas fa-user"></i></span>
        <input type="text" name="username" class="form-control fi-input"
               placeholder="admin" required autocomplete="username"/>
      </div>
    </div>
    <div class="mb-4">
      <label class="fi-label">Password</label>
      <div class="input-group">
        <span class="input-group-text admin-ig"><i class="fas fa-lock"></i></span>
        <input type="password" name="password" class="form-control fi-input"
               placeholder="••••••••" required autocomplete="current-password"/>
      </div>
    </div>
    <button type="submit" class="btn fi-btn-primary w-100">
      <i class="fas fa-sign-in-alt me-2"></i>Login
    </button>
  </form>

  <a href="{{ url_for('index') }}" class="d-block text-center mt-4"
     style="font-size:.82rem;color:var(--text-muted)">
    <i class="fas fa-arrow-left me-1"></i>Back to Site
  </a>
</div>

<style>
  .admin-ig {
    background:var(--glass-bg);
    border-color:var(--glass-border);
    color:var(--text-muted);
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
